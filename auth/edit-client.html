<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modifier client — Cofel</title>

<link rel="stylesheet" href="/styles/cofel-theme-apple-dark.css" />
<link rel="stylesheet" href="/styles/cofel-button-theme.css" />

<style>
  :root{
    --txt:#f5f7ff;
    --txt-dim:rgba(255,255,255,.68);
    --stroke-soft:rgba(255,255,255,.12);
    --glass:rgba(255,255,255,.06);
    --glass-strong:rgba(255,255,255,.10);
    --radius:20px;
    --blur:18px;
    --shadow:0 10px 30px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;}

  html,body{
    min-height:100%;
    margin:0;
    padding:0;
  }

  body{
    color:var(--txt);
    font-family:-apple-system,"SF Pro Text",BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:#000;
    padding:24px;
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 20% 0%, rgba(255,255,255,.10), transparent 28%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,.07), transparent 30%),
      linear-gradient(180deg, #070707 0%, #000 100%);
    z-index:-1;
  }

  h1{
    max-width:560px;
    margin:0 auto 18px;
    font-size:22px;
    font-weight:900;
    letter-spacing:.2px;
    color:#fff;
  }

  .card{
    max-width:560px;
    margin:0 auto;
    padding:22px;
    border-radius:var(--radius);
    background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.045));
    border:1px solid var(--stroke-soft);
    box-shadow:var(--shadow);
    backdrop-filter:blur(var(--blur));
    -webkit-backdrop-filter:blur(var(--blur));
  }

  label{
    display:block;
    margin-top:14px;
    margin-bottom:6px;
    font-size:13px;
    font-weight:700;
    color:var(--txt-dim);
  }

  input,
  select{
    width:100%;
    min-height:40px;
    padding:10px 12px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.07);
    color:#fff;
    font-size:14px;
    outline:none;
    transition:border-color .16s, background .16s, box-shadow .16s;
  }

  input:focus,
  select:focus{
    border-color:rgba(255,255,255,.32);
    background:rgba(255,255,255,.10);
    box-shadow:0 0 0 3px rgba(255,255,255,.08);
  }

  input:disabled{
    opacity:.72;
    cursor:not-allowed;
  }

  input::placeholder{
    color:rgba(255,255,255,.42);
  }

  select option{
    color:#111;
    background:#fff;
  }

  button{
    width:100%;
    margin-top:22px;
    padding:12px 16px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,.18);
    background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.86));
    color:#111;
    font-weight:900;
    cursor:pointer;
    box-shadow:0 10px 24px rgba(0,0,0,.28);
    transition:transform .16s, box-shadow .16s, opacity .16s;
  }

  button:hover{
    transform:translateY(-1px);
    box-shadow:0 14px 30px rgba(0,0,0,.36);
  }

  .msg{
    margin-top:12px;
    font-size:13px;
    font-weight:700;
  }

  .hint{
    margin-top:8px;
    font-size:12px;
    line-height:1.4;
    color:rgba(255,255,255,.58);
  }

  @media(max-width:640px){
    body{padding:16px;}
    h1{font-size:20px;}
    .card{padding:18px;}
  }
</style>
</head>
<body>

  <h1>✏ Modifier un client</h1>

  <div class="card">
    <label>Email actuel (lecture seule)</label>
    <input id="emailCurrent" type="email" disabled>

    <label>Nouvel email</label>
    <input id="emailNew" type="email" placeholder="Laisser vide pour garder l'email actuel">

    <label>Société</label>
    <input id="company" type="text">

    <label>Nom du contact</label>
    <input id="contact" type="text">

    <label>Remise globale (%)</label>
    <input id="discount" type="number" min="0" max="90">

    <label>Remise SR (%)</label>
    <input id="discountSR" type="number" min="0" max="90" value="0">
    <div class="hint">
      Cette remise s’applique uniquement au configurateur “Supports souples / rigides / adhésifs”.
      Si vide / erreur → 0%.
    </div>

    <label>Statut</label>
    <select id="status">
      <option value="active">Actif</option>
      <option value="inactive">Inactif</option>
    </select>

    <button id="btnSave">Enregistrer les modifications</button>

    <div id="msg" class="msg"></div>
  </div>

<script>
const WORKER = "https://cofel-auth.sonveven.workers.dev";

function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

function clampPct(v){
  v = Number(v);
  if (!Number.isFinite(v)) return 0;
  if (v < 0) return 0;
  if (v > 90) return 90;
  return v;
}

const email = getParam("email") || "";
document.getElementById("emailCurrent").value = email;

async function loadClient(){
  const msg = document.getElementById("msg");
  msg.textContent = "";

  const res = await fetch(`${WORKER}/clients`);
  const data = await res.json();
  const client = (data.clients || []).find(c => c.email === email);

  if (!client){
    msg.style.color = "#ffb3b3";
    msg.textContent = "Client introuvable.";
    return;
  }

  document.getElementById("company").value = client.company || "";
  document.getElementById("contact").value = client.contact_name || "";
  document.getElementById("discount").value = Math.round((client.discount_rate||0)*100);

  // ✅ NOUVEAU : remise SR (si absent → 0)
  document.getElementById("discountSR").value = Math.round((client.discount_sr||0)*100);

  document.getElementById("status").value = client.status || "active";
}

loadClient();

document.getElementById("btnSave").onclick = async () => {
  const company = document.getElementById("company").value.trim();
  const contact = document.getElementById("contact").value.trim();

  // globale
  const discount = clampPct(document.getElementById("discount").value);

  // SR (spécifique)
  const discountSR = clampPct(document.getElementById("discountSR").value);

  const status = document.getElementById("status").value;
  let newEmail = document.getElementById("emailNew").value.trim();

  if (!newEmail) newEmail = email;

  const msg = document.getElementById("msg");

  try{
    const res = await fetch(`${WORKER}/client-edit`, {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({
        email,
        newEmail,
        company,
        contact,
        discount,
        discount_sr: discountSR, // ✅ NOUVEAU
        status
      })
    });

    const out = await res.json();

    if (out.ok){
      msg.style.color = "#b7ffcf";
      msg.textContent = "Modifications enregistrées.";
      alert("Client modifié !");
    } else {
      msg.style.color = "#ffb3b3";
      msg.textContent = out.error || "Erreur.";
    }

  }catch(err){
    msg.style.color = "#ffb3b3";
    msg.textContent = "Erreur réseau.";
  }
};
</script>

</body>
</html>
